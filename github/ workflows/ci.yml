name: CI con SonarQube

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compilar y ejecutar pruebas
        run: mvn -B clean verify --no-transfer-progress

      - name: Analizar con SonarQube
        # Nota: el análisis local se ejecuta manualmente
        # mvn sonar:sonar -Dsonar.token=TOKEN -Dsonar.host.url=http://127.0.0.1:9000
        run: echo "Análisis SonarQube ejecutado localmente - ver capturas en docs/"